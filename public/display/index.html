<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display</title>
  <link rel="stylesheet" href="/styles/carbon-tokens.css">
  <style>
    :root {
      --transition-ms: 500ms;
      --grid-gap: 4px;
    }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 100%;
      height: 100%;
      gap: var(--grid-gap);
      padding: var(--grid-gap);
    }

    .cell {
      background: var(--bg-elevated);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-05);
      position: relative;
      overflow: hidden;
    }

    .cell-label {
      position: absolute;
      top: var(--spacing-04);
      left: var(--spacing-04);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-placeholder);
      font-weight: 600;
      z-index: 2;
    }

    .cell-status {
      position: absolute;
      top: var(--spacing-04);
      right: var(--spacing-04);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bg-active);
      z-index: 2;
    }

    .cell-status.online { background: var(--success); }

    .cell-status.processing {
      background: var(--warning);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    .center {
      background: var(--bg);
      border: 2px solid var(--border-subtle);
    }

    .center .incoming-message {
      font-size: 2rem;
      font-weight: 300;
      text-align: center;
      line-height: 1.4;
      max-width: 80%;
      opacity: 0;
      transform: scale(0.9);
      transition: all var(--transition-ms) var(--easing-standard);
    }

    .center .incoming-message.visible {
      opacity: 1;
      transform: scale(1);
    }

    .center .waiting {
      color: var(--bg-active);
      font-size: 1rem;
    }

    .cell-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .cell-content .placeholder { color: var(--bg-active); font-size: 0.9rem; }

    .cell-content .output-text {
      font-size: 1.2rem;
      line-height: var(--line-height);
      max-height: 100%;
      overflow: hidden;
      animation: fadeIn var(--transition-ms) var(--easing-entrance);
    }

    .cell-content .output-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      animation: fadeIn var(--transition-ms) var(--easing-entrance);
    }

    .cell-content .output-html {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn var(--transition-ms) var(--easing-entrance);
    }

    .cell-content video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: var(--radius);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .routing-indicator {
      position: fixed;
      width: 20px;
      height: 20px;
      background: var(--text-primary);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 1000;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .next-indicator {
      position: absolute;
      bottom: var(--spacing-04);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6875rem;
      color: var(--warning);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity var(--duration-moderate);
      z-index: 2;
    }

    .cell.next .next-indicator { opacity: 1; }

    /* Config overlay — top-right, toggleable with 'c' key */
    .config-overlay {
      position: fixed;
      top: var(--spacing-03);
      right: var(--spacing-03);
      background: rgba(0,0,0,0.85);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: var(--spacing-03) var(--spacing-04);
      font-size: 0.625rem;
      font-family: var(--font-mono);
      color: var(--text-placeholder);
      z-index: 100;
      display: none;
      line-height: 1.6;
    }

    .config-overlay.visible { display: block; }

    /* Progress tracker — bottom of center cell */
    .progress-tracker {
      position: absolute;
      bottom: var(--spacing-05);
      left: var(--spacing-05);
      right: var(--spacing-05);
      opacity: 0;
      transition: opacity var(--duration-slow) var(--easing-standard);
      z-index: 3;
    }

    .progress-tracker.active { opacity: 1; }

    .progress-label {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-02);
      text-align: center;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border-subtle);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--warning);
      border-radius: 2px;
      width: 0%;
      transition: width 0.8s var(--easing-standard);
    }

    .progress-stages {
      display: flex;
      justify-content: space-between;
      margin-top: var(--spacing-02);
    }

    .progress-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--bg-active);
      transition: background var(--duration-moderate);
    }

    .progress-dot.done    { background: var(--warning); }
    .progress-dot.current { background: var(--text-primary); }
  </style>
</head>
<body>
  <div class="grid" id="grid">
    <!-- Row 1 -->
    <div class="cell" data-position="0" data-module-id="">
      <span class="cell-label">Module 1</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
    <div class="cell" data-position="1" data-module-id="">
      <span class="cell-label">Module 2</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
    <div class="cell" data-position="2" data-module-id="">
      <span class="cell-label">Module 3</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
    <!-- Row 2 -->
    <div class="cell" data-position="3" data-module-id="">
      <span class="cell-label">Module 4</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
    <div class="cell center" data-position="4">
      <span class="cell-label">Incoming</span>
      <p class="incoming-message" id="incomingMessage"></p>
      <p class="waiting" id="waitingText">Waiting for messages...</p>
      <div class="progress-tracker" id="progressTracker">
        <div class="progress-label" id="progressLabel"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-stages" id="progressDots"></div>
      </div>
    </div>
    <div class="cell" data-position="5" data-module-id="">
      <span class="cell-label">Module 5</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
    <!-- Row 3 -->
    <div class="cell" data-position="6" data-module-id="">
      <span class="cell-label">Module 6</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
    <div class="cell" data-position="7" data-module-id="">
      <span class="cell-label">Module 7</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
    <div class="cell" data-position="8" data-module-id="">
      <span class="cell-label">Module 8</span>
      <span class="cell-status"></span>
      <div class="cell-content"><span class="placeholder">&mdash;</span></div>
      <span class="next-indicator">Next</span>
    </div>
  </div>
  
  <div class="routing-indicator" id="routingIndicator"></div>
  
  <div class="config-overlay" id="configOverlay">
    <div id="configText">Loading config...</div>
  </div>

  <script src="/hub-connect.js"></script>
  <script>
    let socket;
    const grid = document.getElementById('grid');
    const incomingMessage = document.getElementById('incomingMessage');
    const waitingText = document.getElementById('waitingText');
    const routingIndicator = document.getElementById('routingIndicator');
    const configOverlay = document.getElementById('configOverlay');
    const configText = document.getElementById('configText');
    
    // Module positions (excluding center = position 4)
    const modulePositions = [0, 1, 2, 3, 5, 6, 7, 8];
    let modules = [];
    let currentModuleIndex = 0;
    let messageQueue = [];
    let isAnimating = false;
    let demoMode = false;
    
    // Display config (fetched from Hub)
    let displayConfig = {
      resolution: '1080p',
      width: 1920,
      height: 1080,
      framerate: 25,
      messageDisplayMs: 3000,
      transitionMs: 500
    };
    
    // ---- DEMO MODE (for online/concept sharing) ----
    
    const DEMO_MODULES = [
      { id: 'demo-1', name: 'Artist Bridge',     status: 'online',  output: 'Translating dreams into visual poetry...' },
      { id: 'demo-2', name: 'Sound Weaver',      status: 'online',  output: 'Harmonics shifting to collective mood' },
      { id: 'demo-3', name: 'Pattern Engine',     status: 'online',  output: null },
      { id: 'demo-4', name: 'Memory Archive',     status: 'offline', output: null },
      { id: 'demo-5', name: 'Light Sculptor',     status: 'online',  output: 'Projection mapping: active' },
      { id: 'demo-6', name: 'Text Decay',         status: 'offline', output: null },
      { id: 'demo-7', name: 'Collective Voice',   status: 'online',  output: null },
      { id: 'demo-8', name: 'Rhythm Pulse',       status: 'online',  output: 'BPM synced to submission rate' }
    ];
    
    const DEMO_MESSAGES = [
      'I dream of electric gardens growing in the clouds',
      'What if machines could feel the warmth of sunrise?',
      'My hope is that technology brings people closer together',
      'In the future, art creates itself and we just watch',
      'Dancing with algorithms under neon skies',
      'The stars remember every wish ever made',
      'Music flows through fiber optic veins'
    ];
    
    function startDemoMode() {
      if (demoMode) return;
      demoMode = true;
      console.log('[DISPLAY] Demo mode — showing concept layout');
      
      // Populate modules
      DEMO_MODULES.forEach((mod, i) => {
        const pos = modulePositions[i];
        const cell = grid.querySelector(`[data-position="${pos}"]`);
        if (!cell) return;
        cell.dataset.moduleId = mod.id;
        cell.querySelector('.cell-label').textContent = mod.name;
        const status = cell.querySelector('.cell-status');
        status.classList.toggle('online', mod.status === 'online');
        if (mod.output) {
          cell.querySelector('.cell-content').innerHTML =
            '<p class="output-text" style="font-size:1rem;color:#888;">' + mod.output + '</p>';
        }
      });
      
      // Cycle demo messages through center cell
      let msgIdx = 0;
      function cycleMessage() {
        if (!demoMode) return;
        const msg = DEMO_MESSAGES[msgIdx % DEMO_MESSAGES.length];
        msgIdx++;
        
        waitingText.style.display = 'none';
        incomingMessage.textContent = msg;
        incomingMessage.classList.add('visible');
        
        setTimeout(() => {
          incomingMessage.classList.remove('visible');
          
          // Simulate routing to a random online module
          const onlineCells = DEMO_MODULES
            .map((m, i) => m.status === 'online' ? modulePositions[i] : -1)
            .filter(p => p >= 0);
          const targetPos = onlineCells[Math.floor(Math.random() * onlineCells.length)];
          const targetCell = grid.querySelector(`[data-position="${targetPos}"]`);
          
          if (targetCell) {
            targetCell.querySelector('.cell-status').classList.add('processing');
            setTimeout(() => {
              targetCell.querySelector('.cell-status').classList.remove('processing');
              targetCell.querySelector('.cell-status').classList.add('online');
            }, 1500);
          }
          
          setTimeout(cycleMessage, 2000);
        }, displayConfig.messageDisplayMs);
      }
      
      // Start after a brief pause
      setTimeout(cycleMessage, 1500);
    }
    
    // WebRTC peer connections for video streams (moduleId -> RTCPeerConnection)
    const peerConnections = new Map();
    
    // ---- CONFIG ----
    
    async function loadDisplayConfig() {
      try {
        const res = await HubConnection.fetch('/api/config/display');
        const config = await res.json();
        applyConfig(config);
      } catch (e) {
        console.warn('Failed to load display config, using defaults', e);
      }
    }
    
    function applyConfig(config) {
      displayConfig = { ...displayConfig, ...config };
      
      // Apply transition timing
      document.documentElement.style.setProperty('--transition-ms', displayConfig.transitionMs + 'ms');
      
      // Update overlay
      configText.innerHTML = 
        `${displayConfig.resolution} (${displayConfig.width}x${displayConfig.height})<br>` +
        `${displayConfig.framerate} fps<br>` +
        `msg: ${displayConfig.messageDisplayMs}ms / transition: ${displayConfig.transitionMs}ms`;
      
      console.log(`[DISPLAY] Config: ${displayConfig.resolution} @ ${displayConfig.framerate}fps`);
    }
    
    // ---- SOCKET EVENTS ----
    
    // Start demo mode if socket doesn't connect within 5s
    let demoTimeout = setTimeout(() => {
      if (!socket || !socket.connected) startDemoMode();
    }, 5000);
    
    HubConnection.ready.then(() => {
      socket = HubConnection.connectSocket();
      if (!socket) { startDemoMode(); return; }

      socket.on('connect', () => {
      clearTimeout(demoTimeout);
      demoMode = false;
      console.log('Display connected');
      socket.emit('identify', { role: 'display' });
      loadModules();
      loadDisplayConfig();
    });
    
    socket.on('connect_error', () => {
      if (!demoMode) startDemoMode();
    });
    
    socket.on('display-config', (config) => {
      console.log('[DISPLAY] Config update received', config);
      applyConfig(config);
    });
    
    socket.on('module-status', (data) => {
      const idx = modules.findIndex(m => m.id === data.moduleId);
      if (idx !== -1) {
        modules[idx].status = data.status;
        modules[idx].name = data.name || modules[idx].name;
      } else {
        modules.push({ id: data.moduleId, name: data.name, status: data.status });
      }
      updateModuleDisplay();
    });
    
    socket.on('new-message', (message) => {
      messageQueue.push(message);
      processQueue();
    });
    
    socket.on('message-routed', (data) => {
      animateRouting(data.moduleId);
    });
    
    socket.on('module-output', (data) => {
      updateModuleContent(data.moduleId, data.output);
    });
    
    socket.on('message-progress', (data) => {
      updateProgress(data);
    });
    
    // WebRTC signaling for video streams from hub-bridge
    socket.on('webrtc-offer', async (data) => {
      const { moduleId, offer } = data;
      console.log(`[DISPLAY] WebRTC offer from module ${moduleId}`);
      
      try {
        const pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });
        
        peerConnections.set(moduleId, pc);
        
        pc.ontrack = (event) => {
          console.log(`[DISPLAY] Video track received from ${moduleId}`);
          attachVideoStream(moduleId, event.streams[0]);
        };
        
        pc.onicecandidate = (event) => {
          if (event.candidate) {
            socket.emit('webrtc-ice-candidate', { moduleId, candidate: event.candidate });
          }
        };
        
        pc.onconnectionstatechange = () => {
          console.log(`[DISPLAY] WebRTC state for ${moduleId}: ${pc.connectionState}`);
          if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
            detachVideoStream(moduleId);
            peerConnections.delete(moduleId);
          }
        };
        
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        
        socket.emit('webrtc-answer', { moduleId, answer });
      } catch (e) {
        console.error(`[DISPLAY] WebRTC error for ${moduleId}:`, e);
      }
    });
    
      socket.on('webrtc-ice-candidate', async (data) => {
        const pc = peerConnections.get(data.moduleId);
        if (pc) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
          } catch (e) {
            console.error('[DISPLAY] ICE candidate error:', e);
          }
        }
      });
    }); // end HubConnection.ready
    
    // ---- VIDEO STREAM HELPERS ----
    
    function attachVideoStream(moduleId, stream) {
      const cell = grid.querySelector(`[data-module-id="${moduleId}"]`);
      if (!cell) return;
      
      const content = cell.querySelector('.cell-content');
      content.innerHTML = '';
      
      const video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.muted = true;
      video.playsInline = true;
      content.appendChild(video);
      
      console.log(`[DISPLAY] Video stream attached to ${moduleId}`);
    }
    
    function detachVideoStream(moduleId) {
      const cell = grid.querySelector(`[data-module-id="${moduleId}"]`);
      if (!cell) return;
      
      const content = cell.querySelector('.cell-content');
      const video = content.querySelector('video');
      if (video) {
        video.srcObject = null;
        content.innerHTML = '<span class="placeholder">&mdash;</span>';
      }
    }
    
    // ---- MODULE DISPLAY ----
    
    async function loadModules() {
      try {
        const res = await HubConnection.fetch('/api/modules');
        modules = await res.json();
        updateModuleDisplay();
      } catch (e) {
        console.error('Failed to load modules', e);
      }
    }
    
    function updateModuleDisplay() {
      modules.forEach((mod, i) => {
        if (i < modulePositions.length) {
          const pos = modulePositions[i];
          const cell = grid.querySelector(`[data-position="${pos}"]`);
          if (cell) {
            cell.dataset.moduleId = mod.id;
            cell.querySelector('.cell-label').textContent = mod.name;
            const status = cell.querySelector('.cell-status');
            status.classList.toggle('online', mod.status === 'online');
          }
        }
      });
      updateNextIndicator();
    }
    
    function updateNextIndicator() {
      grid.querySelectorAll('.cell.next').forEach(c => c.classList.remove('next'));
      const onlineModules = modules.filter(m => m.status === 'online');
      if (onlineModules.length > 0) {
        const nextModule = onlineModules[currentModuleIndex % onlineModules.length];
        const cell = grid.querySelector(`[data-module-id="${nextModule.id}"]`);
        if (cell) cell.classList.add('next');
      }
    }
    
    // ---- MESSAGE QUEUE ----
    
    function processQueue() {
      if (isAnimating || messageQueue.length === 0) return;
      const message = messageQueue.shift();
      showIncomingMessage(message);
    }
    
    function showIncomingMessage(message) {
      isAnimating = true;
      waitingText.style.display = 'none';
      incomingMessage.textContent = message.message;
      incomingMessage.classList.add('visible');
      
      // Display message then finish — routing is server-side
      setTimeout(() => {
        incomingMessage.classList.remove('visible');
        finishAnimation();
      }, displayConfig.messageDisplayMs);
    }
    
    function animateRouting(moduleId) {
      const centerCell = grid.querySelector('[data-position="4"]');
      const targetCell = grid.querySelector(`[data-module-id="${moduleId}"]`);
      
      if (!centerCell || !targetCell) {
        finishAnimation();
        return;
      }
      
      const centerRect = centerCell.getBoundingClientRect();
      const targetRect = targetCell.getBoundingClientRect();
      
      const startX = centerRect.left + centerRect.width / 2;
      const startY = centerRect.top + centerRect.height / 2;
      const endX = targetRect.left + targetRect.width / 2;
      const endY = targetRect.top + targetRect.height / 2;
      
      routingIndicator.style.left = startX + 'px';
      routingIndicator.style.top = startY + 'px';
      routingIndicator.style.opacity = '1';
      
      setTimeout(() => {
        routingIndicator.style.transition = `all ${displayConfig.transitionMs * 1.5}ms ease-in-out`;
        routingIndicator.style.left = endX + 'px';
        routingIndicator.style.top = endY + 'px';
      }, 50);
      
      incomingMessage.classList.remove('visible');
      targetCell.querySelector('.cell-status').classList.add('processing');
      
      setTimeout(() => {
        routingIndicator.style.opacity = '0';
        routingIndicator.style.transition = 'none';
        finishAnimation();
      }, displayConfig.transitionMs * 1.5 + 200);
    }
    
    function finishAnimation() {
      isAnimating = false;
      if (messageQueue.length === 0) {
        waitingText.style.display = 'block';
      }
      setTimeout(processQueue, Math.max(200, displayConfig.transitionMs / 2));
    }
    
    // ---- MODULE OUTPUT ----
    
    function updateModuleContent(moduleId, data) {
      const cell = grid.querySelector(`[data-module-id="${moduleId}"]`);
      if (!cell) return;
      
      const content = cell.querySelector('.cell-content');
      const status = cell.querySelector('.cell-status');
      
      status.classList.remove('processing');
      status.classList.add('online');
      
      if (!data) return;
      
      switch (data.type) {
        case 'text':
          content.innerHTML = '<p class="output-text">' + escapeHtml(data.content) + '</p>';
          break;
        case 'image':
          content.innerHTML = `<img class="output-image" src="${data.url}" alt="">`;
          break;
        case 'html':
          content.innerHTML = '<div class="output-html">' + data.content + '</div>';
          break;
        case 'video':
          // Direct video URL (e.g. from hub-bridge recording)
          content.innerHTML = `<video src="${data.url}" autoplay muted loop playsinline></video>`;
          break;
        default:
          if (data.content) {
            content.innerHTML = '<p class="output-text">' + escapeHtml(String(data.content)) + '</p>';
          }
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // ---- PROGRESS TRACKING ----
    
    const progressTracker = document.getElementById('progressTracker');
    const progressLabel = document.getElementById('progressLabel');
    const progressFill = document.getElementById('progressFill');
    const progressDots = document.getElementById('progressDots');
    let progressTimeout = null;
    
    // Initialize dots
    function initProgressDots(total) {
      progressDots.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        dot.dataset.stage = i;
        progressDots.appendChild(dot);
      }
    }
    
    function updateProgress(data) {
      const { stage, stageLabel, totalStages, percent } = data;
      
      // Initialize dots if needed
      if (progressDots.children.length !== totalStages) {
        initProgressDots(totalStages);
      }
      
      // Show tracker
      progressTracker.classList.add('active');
      
      // Update label and bar
      progressLabel.textContent = stageLabel;
      progressFill.style.width = percent + '%';
      
      // Update dots
      Array.from(progressDots.children).forEach((dot, i) => {
        dot.classList.toggle('done', i < stage);
        dot.classList.toggle('current', i === stage);
      });
      
      // Auto-hide after completion
      if (progressTimeout) clearTimeout(progressTimeout);
      if (stage === totalStages - 1) {
        progressTimeout = setTimeout(() => {
          progressTracker.classList.remove('active');
          progressFill.style.width = '0%';
        }, 5000);
      }
    }
    
    // ---- KEYBOARD SHORTCUTS ----
    
    document.addEventListener('keydown', (e) => {
      // 'c' toggles config overlay
      if (e.key === 'c' && !e.ctrlKey && !e.metaKey) {
        configOverlay.classList.toggle('visible');
      }
      // 'f' toggles fullscreen
      if (e.key === 'f' && !e.ctrlKey && !e.metaKey) {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen();
        }
      }
    });
  </script>
</body>
</html>
