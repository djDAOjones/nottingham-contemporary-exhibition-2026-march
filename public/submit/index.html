<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Submit</title>
  <link rel="stylesheet" href="/styles/carbon-tokens.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-05);
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .prompt {
      font-size: 1.5rem;
      font-weight: 300;
      text-align: center;
      margin-bottom: var(--spacing-07);
      line-height: 1.4;
      color: var(--text-primary);
    }

    .input-area {
      position: relative;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: var(--spacing-05);
      font-size: 1.1rem;
      font-family: var(--font);
      background: var(--bg-elevated);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius);
      color: var(--text-primary);
      resize: none;
      transition: border-color var(--duration-fast) var(--easing-standard);
    }

    textarea:focus {
      outline: 2px solid var(--interactive);
      outline-offset: -2px;
      border-color: var(--interactive);
    }

    textarea::placeholder { color: var(--text-placeholder); }

    .char-count {
      position: absolute;
      bottom: var(--spacing-04);
      right: var(--spacing-04);
      font-size: 0.75rem;
      color: var(--text-placeholder);
    }

    .char-count.warning { color: var(--warning); }
    .char-count.error   { color: var(--danger); }

    .submit-btn {
      width: 100%;
      padding: var(--spacing-05);
      margin-top: var(--spacing-05);
      font-size: 1.1rem;
      font-weight: 600;
      font-family: var(--font);
      background: var(--text-primary);
      color: var(--text-on-color);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--duration-fast) var(--easing-standard);
    }

    .submit-btn:hover:not(:disabled) { background: var(--text-secondary); }

    .submit-btn:disabled {
      background: var(--bg-active);
      color: var(--text-placeholder);
      cursor: not-allowed;
    }

    .feedback {
      text-align: center;
      margin-top: var(--spacing-05);
      padding: var(--spacing-05);
      border-radius: var(--radius);
      display: none;
      font-weight: 500;
    }

    .feedback.success {
      display: block;
      background: var(--success-bg);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .feedback.error {
      display: block;
      background: var(--danger-bg);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .feedback.waiting {
      display: block;
      background: var(--warning-bg);
      border: 1px solid var(--warning);
      color: var(--warning);
    }

    .notice {
      margin-top: var(--spacing-07);
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: var(--line-height);
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <p class="prompt" id="prompt" aria-live="polite">Loading&hellip;</p>

    <div class="input-area">
      <label for="message" class="sr-only">Your message</label>
      <textarea
        id="message"
        placeholder="Type your response here…"
        maxlength="280"
        aria-describedby="charCount"
      ></textarea>
      <span class="char-count" id="charCount" aria-live="polite">0/280</span>
    </div>

    <button class="submit-btn" id="submitBtn" disabled aria-label="Send your message">Send</button>

    <div class="feedback" id="feedback" role="alert" aria-live="assertive"></div>

    <p class="notice">
      Your submission will be displayed publicly.<br>
      Please don't include personal information.
    </p>
  </main>

  <script src="/hub-connect.js"></script>
  <script>
    const promptEl = document.getElementById('prompt');
    const messageEl = document.getElementById('message');
    const charCountEl = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const feedbackEl = document.getElementById('feedback');
    
    let maxLength = 280;
    let sessionId = localStorage.getItem('sessionId');
    if (!sessionId) {
      sessionId = 'sess_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
      localStorage.setItem('sessionId', sessionId);
    }
    
    // Load prompt
    async function loadPrompt() {
      try {
        const res = await HubConnection.fetch('/api/prompt');
        const data = await res.json();
        promptEl.textContent = data.prompt;
        maxLength = data.maxLength;
        messageEl.maxLength = maxLength;
        charCountEl.textContent = `0/${maxLength}`;
      } catch (e) {
        promptEl.textContent = 'Send a dream...';
      }
    }
    
    // Character count
    messageEl.addEventListener('input', () => {
      const len = messageEl.value.length;
      charCountEl.textContent = `${len}/${maxLength}`;
      
      charCountEl.classList.remove('warning', 'error');
      if (len > maxLength * 0.9) {
        charCountEl.classList.add('error');
      } else if (len > maxLength * 0.75) {
        charCountEl.classList.add('warning');
      }
      
      submitBtn.disabled = len === 0 || len > maxLength;
    });
    
    // Submit
    submitBtn.addEventListener('click', async () => {
      const message = messageEl.value.trim();
      if (!message) return;
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      feedbackEl.className = 'feedback';
      
      try {
        const res = await HubConnection.fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          feedbackEl.textContent = 'Sent! Your message is being reviewed.';
          feedbackEl.className = 'feedback success';
          messageEl.value = '';
          charCountEl.textContent = `0/${maxLength}`;
          
          // Re-enable after rate limit
          submitBtn.textContent = 'Please wait...';
          setTimeout(() => {
            submitBtn.textContent = 'Send';
            submitBtn.disabled = false;
          }, 30000);
        } else {
          feedbackEl.textContent = data.error || 'Something went wrong. Try again.';
          feedbackEl.className = 'feedback error';
          submitBtn.textContent = 'Send';
          submitBtn.disabled = false;
        }
      } catch (e) {
        feedbackEl.textContent = 'Connection error. Try again.';
        feedbackEl.className = 'feedback error';
        submitBtn.textContent = 'Send';
        submitBtn.disabled = false;
      }
    });
    
    HubConnection.ready.then(() => loadPrompt());
  </script>
</body>
</html>
