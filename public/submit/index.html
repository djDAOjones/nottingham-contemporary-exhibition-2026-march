<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Submit</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 400px;
    }
    
    .prompt {
      font-size: 1.5rem;
      font-weight: 300;
      text-align: center;
      margin-bottom: 30px;
      line-height: 1.4;
      color: #e0e0e0;
    }
    
    .input-area {
      position: relative;
    }
    
    textarea {
      width: 100%;
      height: 150px;
      padding: 16px;
      font-size: 1.1rem;
      font-family: inherit;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      color: #fff;
      resize: none;
      transition: border-color 0.2s;
    }
    
    textarea:focus {
      outline: none;
      border-color: #666;
    }
    
    .char-count {
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 0.8rem;
      color: #666;
    }
    
    .char-count.warning {
      color: #f59e0b;
    }
    
    .char-count.error {
      color: #ef4444;
    }
    
    button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover:not(:disabled) {
      background: #e0e0e0;
      transform: translateY(-1px);
    }
    
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    
    .feedback {
      text-align: center;
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      display: none;
    }
    
    .feedback.success {
      display: block;
      background: #065f4620;
      border: 1px solid #10b981;
      color: #10b981;
    }
    
    .feedback.error {
      display: block;
      background: #7f1d1d20;
      border: 1px solid #ef4444;
      color: #ef4444;
    }
    
    .feedback.waiting {
      display: block;
      background: #78350f20;
      border: 1px solid #f59e0b;
      color: #f59e0b;
    }
    
    .notice {
      margin-top: 30px;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="prompt" id="prompt">Loading...</p>
    
    <div class="input-area">
      <textarea 
        id="message" 
        placeholder="Type your response here..."
        maxlength="280"
      ></textarea>
      <span class="char-count" id="charCount">0/280</span>
    </div>
    
    <button id="submitBtn" disabled>Send</button>
    
    <div class="feedback" id="feedback"></div>
    
    <p class="notice">
      Your submission will be displayed publicly.<br>
      Please don't include personal information.
    </p>
  </div>

  <script src="/hub-connect.js"></script>
  <script>
    const promptEl = document.getElementById('prompt');
    const messageEl = document.getElementById('message');
    const charCountEl = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const feedbackEl = document.getElementById('feedback');
    
    let maxLength = 280;
    let sessionId = localStorage.getItem('sessionId');
    if (!sessionId) {
      sessionId = 'sess_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
      localStorage.setItem('sessionId', sessionId);
    }
    
    // Load prompt
    async function loadPrompt() {
      try {
        const res = await HubConnection.fetch('/api/prompt');
        const data = await res.json();
        promptEl.textContent = data.prompt;
        maxLength = data.maxLength;
        messageEl.maxLength = maxLength;
        charCountEl.textContent = `0/${maxLength}`;
      } catch (e) {
        promptEl.textContent = 'Send a dream...';
      }
    }
    
    // Character count
    messageEl.addEventListener('input', () => {
      const len = messageEl.value.length;
      charCountEl.textContent = `${len}/${maxLength}`;
      
      charCountEl.classList.remove('warning', 'error');
      if (len > maxLength * 0.9) {
        charCountEl.classList.add('error');
      } else if (len > maxLength * 0.75) {
        charCountEl.classList.add('warning');
      }
      
      submitBtn.disabled = len === 0 || len > maxLength;
    });
    
    // Submit
    submitBtn.addEventListener('click', async () => {
      const message = messageEl.value.trim();
      if (!message) return;
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      feedbackEl.className = 'feedback';
      
      try {
        const res = await HubConnection.fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          feedbackEl.textContent = 'Sent! Your message is being reviewed.';
          feedbackEl.className = 'feedback success';
          messageEl.value = '';
          charCountEl.textContent = `0/${maxLength}`;
          
          // Re-enable after rate limit
          submitBtn.textContent = 'Please wait...';
          setTimeout(() => {
            submitBtn.textContent = 'Send';
            submitBtn.disabled = false;
          }, 30000);
        } else {
          feedbackEl.textContent = data.error || 'Something went wrong. Try again.';
          feedbackEl.className = 'feedback error';
          submitBtn.textContent = 'Send';
          submitBtn.disabled = false;
        }
      } catch (e) {
        feedbackEl.textContent = 'Connection error. Try again.';
        feedbackEl.className = 'feedback error';
        submitBtn.textContent = 'Send';
        submitBtn.disabled = false;
      }
    });
    
    HubConnection.ready.then(() => loadPrompt());
  </script>
</body>
</html>
