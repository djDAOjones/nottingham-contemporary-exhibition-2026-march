<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Message Checker — read-only view of all messages and moderation status">
  <title>Message Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #666;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }

    .status-dot.connected { background: #10b981; }

    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
      background: #111;
      border-radius: 10px;
      padding: 3px;
      width: fit-content;
    }

    .tab {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover { color: #ccc; }

    .tab.active {
      background: #222;
      color: #fff;
    }

    .tab .badge {
      display: inline-block;
      min-width: 18px;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      text-align: center;
      margin-left: 6px;
    }

    .tab .badge.pending { background: #f59e0b; color: #000; }
    .tab .badge.approved { background: #10b981; color: #000; }
    .tab .badge.rejected { background: #ef4444; color: #fff; }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 900px;
    }

    .message-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: #555;
    }

    .message-card .meta .id { font-family: 'SF Mono', monospace; }

    .message-card .status-badge {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-badge.pending { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b40; }
    .status-badge.approved { background: #10b98120; color: #10b981; border: 1px solid #10b98140; }
    .status-badge.rejected { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }

    .message-card .text {
      font-size: 1rem;
      line-height: 1.5;
      color: #d0d0d0;
      word-break: break-word;
    }

    .message-card .reason {
      margin-top: 8px;
      padding: 8px 12px;
      background: #1a0a0a;
      border: 1px solid #ef444430;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #ef4444;
    }

    .message-card .reason::before {
      content: 'Reason: ';
      font-weight: 600;
    }

    .message-card .edited {
      margin-top: 6px;
      font-size: 0.75rem;
      color: #f59e0b;
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #444;
      font-size: 0.9rem;
    }

    .refresh-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.75rem;
      color: #555;
    }

    .refresh-bar button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .refresh-bar button:hover { background: #222; color: #fff; }

    @media (max-width: 600px) {
      body { padding: 16px; }
      .tabs { width: 100%; }
      .tab { flex: 1; text-align: center; padding: 8px 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Message Checker</h1>
    <div class="connection-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="all" onclick="switchTab('all')">All <span class="badge" id="badgeAll">0</span></button>
    <button class="tab" data-tab="pending" onclick="switchTab('pending')">Pending <span class="badge pending" id="badgePending">0</span></button>
    <button class="tab" data-tab="approved" onclick="switchTab('approved')">Approved <span class="badge approved" id="badgeApproved">0</span></button>
    <button class="tab" data-tab="rejected" onclick="switchTab('rejected')">Rejected <span class="badge rejected" id="badgeRejected">0</span></button>
  </div>

  <div class="refresh-bar">
    <span id="lastUpdated">Loading...</span>
    <button onclick="refreshAll()">Refresh</button>
  </div>

  <div class="message-list" id="messageList">
    <div class="empty-state">Loading messages...</div>
  </div>

  <script src="/hub-connect.js"></script>
  <script>
    let pending = [];
    let approved = [];
    let rejected = [];
    let currentTab = 'all';

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      render();
    }

    function getVisibleMessages() {
      let messages = [];
      if (currentTab === 'all' || currentTab === 'pending') {
        messages = messages.concat(pending.map(m => ({ ...m, _status: 'pending' })));
      }
      if (currentTab === 'all' || currentTab === 'approved') {
        messages = messages.concat(approved.map(m => ({ ...m, _status: 'approved' })));
      }
      if (currentTab === 'all' || currentTab === 'rejected') {
        messages = messages.concat(rejected.map(m => ({ ...m, _status: 'rejected' })));
      }
      // Sort newest first
      messages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      return messages;
    }

    function render() {
      // Update badges
      document.getElementById('badgeAll').textContent = pending.length + approved.length + rejected.length;
      document.getElementById('badgePending').textContent = pending.length;
      document.getElementById('badgeApproved').textContent = approved.length;
      document.getElementById('badgeRejected').textContent = rejected.length;

      const list = document.getElementById('messageList');
      const messages = getVisibleMessages();

      if (messages.length === 0) {
        list.innerHTML = '<div class="empty-state">No messages yet</div>';
        return;
      }

      list.innerHTML = messages.map(m => {
        const time = new Date(m.timestamp).toLocaleString();
        const id = (m.id || '').slice(0, 8);
        let extra = '';
        if (m._status === 'rejected' && m.reason) {
          extra += `<div class="reason">${escapeHtml(m.reason)}</div>`;
        }
        if (m.editedMessage) {
          extra += `<div class="edited">Edited before approval</div>`;
        }
        return `
          <div class="message-card">
            <div class="meta">
              <span class="id">${id}</span>
              <span>
                <span class="status-badge ${m._status}">${m._status}</span>
                <span style="margin-left:8px;">${time}</span>
              </span>
            </div>
            <div class="text">${escapeHtml(m.message || m.editedMessage || '')}</div>
            ${extra}
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function refreshAll() {
      try {
        const [pendingRes, approvedRes, rejectedRes] = await Promise.all([
          HubConnection.fetch('/api/submissions').then(r => r.json()),
          HubConnection.fetch('/api/submissions/approved').then(r => r.json()),
          HubConnection.fetch('/api/rejected').then(r => r.json())
        ]);
        pending = pendingRes;
        approved = approvedRes;
        rejected = rejectedRes;
        render();
        document.getElementById('lastUpdated').textContent =
          'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        console.error('[CHECKER] Failed to fetch messages:', e);
        document.getElementById('lastUpdated').textContent = 'Update failed';
      }
    }

    HubConnection.ready.then(() => {
      const socket = HubConnection.connectSocket();

      socket.on('connect', () => {
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('statusText').textContent = 'Connected';
        socket.emit('join', { role: 'checker' });
        refreshAll();
      });

      socket.on('disconnect', () => {
        document.getElementById('statusDot').classList.remove('connected');
        document.getElementById('statusText').textContent = 'Disconnected';
      });

      // Real-time updates
      socket.on('new-submission', (submission) => {
        pending.unshift(submission);
        render();
      });

      socket.on('message-approved', (message) => {
        // Remove from pending, add to approved
        pending = pending.filter(m => m.id !== message.id);
        approved.unshift(message);
        render();
      });

      socket.on('message-rejected', (data) => {
        // Remove from pending, add to rejected
        pending = pending.filter(m => m.id !== data.id);
        rejected.unshift(data);
        render();
      });
    });

    // Auto-refresh every 30s as fallback
    setInterval(refreshAll, 30000);
  </script>
</body>
</html>
