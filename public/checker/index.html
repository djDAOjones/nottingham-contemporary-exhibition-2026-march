<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Message Checker — read-only view of all messages and moderation status">
  <title>Message Checker</title>
  <link rel="stylesheet" href="/styles/carbon-tokens.css">
  <style>
    body { padding: var(--spacing-06); min-height: 100vh; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-06);
    }

    h1 { font-size: 1.125rem; font-weight: 600; }

    .connection-status {
      display: flex;
      align-items: center;
      gap: var(--spacing-03);
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: var(--spacing-05);
      background: var(--bg-elevated);
      border-radius: var(--radius);
      padding: 3px;
      width: fit-content;
    }

    .tab {
      padding: var(--spacing-03) var(--spacing-05);
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--easing-standard);
    }

    .tab:hover { color: var(--text-primary); }

    .tab.active {
      background: var(--bg-active);
      color: var(--text-primary);
    }

    .tab .badge {
      display: inline-block;
      min-width: 18px;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 0.6875rem;
      font-weight: 700;
      text-align: center;
      margin-left: var(--spacing-02);
    }

    .tab .badge.pending  { background: var(--warning); color: var(--text-on-color); }
    .tab .badge.approved { background: var(--success); color: var(--text-on-color); }
    .tab .badge.rejected { background: var(--danger);  color: #fff; }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-03);
      max-width: 900px;
    }

    .message-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: var(--spacing-05);
      animation: fadeIn var(--duration-moderate) var(--easing-entrance);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-03);
      font-size: 0.75rem;
      color: var(--text-helper);
    }

    .message-card .meta .id { font-family: var(--font-mono); }

    .message-card .status-badge {
      padding: 2px var(--spacing-03);
      border-radius: var(--radius);
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-badge.pending  { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning); }
    .status-badge.approved { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
    .status-badge.rejected { background: var(--danger-bg);  color: var(--danger);  border: 1px solid var(--danger); }

    .message-card .text {
      font-size: var(--text-base);
      line-height: var(--line-height);
      color: var(--text-primary);
      word-break: break-word;
    }

    .message-card .reason {
      margin-top: var(--spacing-03);
      padding: var(--spacing-03) var(--spacing-04);
      background: var(--danger-bg);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      color: var(--danger);
    }

    .message-card .reason::before {
      content: 'Reason: ';
      font-weight: 600;
    }

    .message-card .edited {
      margin-top: var(--spacing-02);
      font-size: 0.75rem;
      color: var(--warning);
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      padding: var(--spacing-09) var(--spacing-05);
      color: var(--text-placeholder);
      font-size: var(--text-base);
    }

    .refresh-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-05);
      font-size: 0.75rem;
      color: var(--text-helper);
    }

    @media (max-width: 600px) {
      body { padding: var(--spacing-05); }
      .tabs { width: 100%; }
      .tab { flex: 1; text-align: center; padding: var(--spacing-03); font-size: 0.8125rem; }
    }
  </style>
</head>
<body>
  <header role="banner">
    <h1>Message Checker</h1>
    <div class="connection-status" role="status" aria-live="polite">
      <div class="status-dot" id="statusDot" aria-hidden="true"></div>
      <span id="statusText">Connecting&hellip;</span>
    </div>
  </header>

  <main role="main">
    <nav class="tabs" id="tabs" aria-label="Filter messages by status">
      <button class="tab active" data-tab="all" onclick="switchTab('all')" aria-pressed="true">All <span class="badge" id="badgeAll">0</span></button>
      <button class="tab" data-tab="pending" onclick="switchTab('pending')" aria-pressed="false">Pending <span class="badge pending" id="badgePending">0</span></button>
      <button class="tab" data-tab="approved" onclick="switchTab('approved')" aria-pressed="false">Approved <span class="badge approved" id="badgeApproved">0</span></button>
      <button class="tab" data-tab="rejected" onclick="switchTab('rejected')" aria-pressed="false">Rejected <span class="badge rejected" id="badgeRejected">0</span></button>
    </nav>

    <div class="refresh-bar">
      <span id="lastUpdated">Loading&hellip;</span>
      <button class="btn" onclick="refreshAll()" aria-label="Refresh messages">Refresh</button>
    </div>

    <div class="message-list" id="messageList" role="list" aria-label="Messages">
      <div class="empty-state" role="status">Loading messages&hellip;</div>
    </div>
  </main>

  <script src="/hub-connect.js"></script>
  <script>
    let pending = [];
    let approved = [];
    let rejected = [];
    let currentTab = 'all';

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      render();
    }

    function getVisibleMessages() {
      let messages = [];
      if (currentTab === 'all' || currentTab === 'pending') {
        messages = messages.concat(pending.map(m => ({ ...m, _status: 'pending' })));
      }
      if (currentTab === 'all' || currentTab === 'approved') {
        messages = messages.concat(approved.map(m => ({ ...m, _status: 'approved' })));
      }
      if (currentTab === 'all' || currentTab === 'rejected') {
        messages = messages.concat(rejected.map(m => ({ ...m, _status: 'rejected' })));
      }
      // Sort newest first
      messages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      return messages;
    }

    function render() {
      // Update badges
      document.getElementById('badgeAll').textContent = pending.length + approved.length + rejected.length;
      document.getElementById('badgePending').textContent = pending.length;
      document.getElementById('badgeApproved').textContent = approved.length;
      document.getElementById('badgeRejected').textContent = rejected.length;

      const list = document.getElementById('messageList');
      const messages = getVisibleMessages();

      if (messages.length === 0) {
        list.innerHTML = '<div class="empty-state">No messages yet</div>';
        return;
      }

      list.innerHTML = messages.map(m => {
        const time = new Date(m.timestamp).toLocaleString();
        const id = (m.id || '').slice(0, 8);
        let extra = '';
        if (m._status === 'rejected' && m.reason) {
          extra += `<div class="reason">${escapeHtml(m.reason)}</div>`;
        }
        if (m.editedMessage) {
          extra += `<div class="edited">Edited before approval</div>`;
        }
        return `
          <div class="message-card">
            <div class="meta">
              <span class="id">${id}</span>
              <span>
                <span class="status-badge ${m._status}">${m._status}</span>
                <span style="margin-left:8px;">${time}</span>
              </span>
            </div>
            <div class="text">${escapeHtml(m.message || m.editedMessage || '')}</div>
            ${extra}
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function refreshAll() {
      try {
        const [pendingRes, approvedRes, rejectedRes] = await Promise.all([
          HubConnection.fetch('/api/submissions').then(r => r.json()),
          HubConnection.fetch('/api/submissions/approved').then(r => r.json()),
          HubConnection.fetch('/api/rejected').then(r => r.json())
        ]);
        pending = pendingRes;
        approved = approvedRes;
        rejected = rejectedRes;
        render();
        document.getElementById('lastUpdated').textContent =
          'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        console.error('[CHECKER] Failed to fetch messages:', e);
        document.getElementById('lastUpdated').textContent = 'Update failed';
      }
    }

    HubConnection.ready.then(() => {
      const socket = HubConnection.connectSocket();

      socket.on('connect', () => {
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('statusText').textContent = 'Connected';
        socket.emit('join', { role: 'checker' });
        refreshAll();
      });

      socket.on('disconnect', () => {
        document.getElementById('statusDot').classList.remove('connected');
        document.getElementById('statusText').textContent = 'Disconnected';
      });

      // Real-time updates
      socket.on('new-submission', (submission) => {
        pending.unshift(submission);
        render();
      });

      socket.on('message-approved', (message) => {
        // Remove from pending, add to approved
        pending = pending.filter(m => m.id !== message.id);
        approved.unshift(message);
        render();
      });

      socket.on('message-rejected', (data) => {
        // Remove from pending, add to rejected
        pending = pending.filter(m => m.id !== data.id);
        rejected.unshift(data);
        render();
      });
    });

    // Auto-refresh every 30s as fallback
    setInterval(refreshAll, 30000);
  </script>
</body>
</html>
