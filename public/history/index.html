<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      padding: 40px;
    }
    
    h1 {
      font-size: 1rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #444;
      margin-bottom: 40px;
    }
    
    .messages {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    .message {
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message-text {
      font-size: 1.5rem;
      font-weight: 300;
      line-height: 1.4;
      color: #e0e0e0;
    }
    
    .message-time {
      font-size: 0.8rem;
      color: #444;
      margin-top: 8px;
    }
    
    .empty-state {
      color: #333;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h1>Recent Submissions</h1>
  
  <div class="messages" id="messages">
    <p class="empty-state">Waiting for submissions...</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const messagesEl = document.getElementById('messages');
    
    let messages = [];
    const MAX_MESSAGES = 20;
    
    socket.on('connect', () => {
      socket.emit('join', { role: 'history' });
    });
    
    socket.on('message-approved', (message) => {
      messages.unshift(message);
      if (messages.length > MAX_MESSAGES) {
        messages = messages.slice(0, MAX_MESSAGES);
      }
      render();
    });
    
    function render() {
      if (messages.length === 0) {
        messagesEl.innerHTML = '<p class="empty-state">Waiting for submissions...</p>';
        return;
      }
      
      messagesEl.innerHTML = messages.map(m => `
        <div class="message">
          <p class="message-text">${escapeHtml(m.message)}</p>
          <p class="message-time">${formatTime(m.timestamp)}</p>
        </div>
      `).join('');
    }
    
    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString();
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
